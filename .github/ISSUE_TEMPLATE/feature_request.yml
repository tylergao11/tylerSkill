name: Feature request
description: Propose a new capability, protocol, template, or tool.
title: "[Feature]: "
labels: ["type:feature"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should the skill help agents do?
    validations:
      required: true
  - type: textarea
    id: trigger
    attributes:
      label: Trigger
      description: When should agents load or use this capability?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What observable behavior proves it works?
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - SKILL.md
        - references
        - scripts
        - templates
        - evals
        - GitHub workflow
    validations:
      required: true
